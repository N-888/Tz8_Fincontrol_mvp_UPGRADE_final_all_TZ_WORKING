{% extends 'base.html' %}
{% block title %}{{ title }} | FinControl{% endblock %}
{% block content %}
<!-- Обёртка формы операции. -->
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="fc-card p-4 p-lg-5">
            <h1 class="h3 fw-bold mb-4">{{ title }}</h1>

            <!-- Форма операции. -->
            <form method="post">
                {% csrf_token %}

                <!-- Проходим по всем полям формы. -->
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|join:', ' }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <!-- Кнопки управления. -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
